<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls@2.2.0/dist/aframe-blink-controls.min.js"></script>
    <title>Document</title>
</head>
    <body>
        <a-scene>
            <a-sphere position="0 0 0" radius="1.25" color="#BAD3FF" material="opacity:0.3;"></a-sphere>
            <a-sphere position="0 0 0" radius="0.4" color="#BAD3FF" material="opacity:1;"></a-sphere>
            <a-cylinder position="0 0 0" rotation="0 90 90" radius="0.1" height="2.5" color="#BAD3FF" material="opacity:1;"></a-cylinder>
            <a-cylinder position="0 0 0" rotation="0 90 0" radius="0.1" height="2.5" color="#BAD3FF" material="opacity:1;"></a-cylinder>
            <a-cylinder position="0 0 0" rotation="200 180 90" radius="0.1" height="2.5" color="#BAD3FF" material="opacity:1;"></a-cylinder>
            <a-plane class="suelo" position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
            <a-sky color="#0A0F17"></a-sky>
            <a-entity id="rig">
                <a-camera></a-camera>

                <a-entity laser-controls="hand: left" 
                        blink-controls="cameraRig: #rig; teleportOrigin: a-camera; collisionEntities: .suelo; curveStyle: curved">
                </a-entity>

                <a-entity laser-controls="hand: right"></a-entity>
            </a-entity>
        </a-scene>
  </body>
</html>
